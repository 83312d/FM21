<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qI FM — Интернет-радио</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="application/json" id="fm21-cities">
      [{"tag":"moscow","name":"Москва"},{"tag":"spb","name":"Санкт-Петербург"}]
    </script>
  </head>
  <body>
    <div class="radio-card" id="fm21-player" role="main" aria-label="Радио-плеер qI FM">
      <span class="player__tagline sr-only"
        >Общий эфир — вы подключаетесь к прямому эфиру города</span
      >

      <header class="radio-header">
        <div class="logo-block">
          <img
            src="/assets/logo.png"
            alt="qI FM"
            class="logo-img"
            width="88"
            height="44"
          />
          <div class="logo-text">Радио<span>·</span>Рубрика</div>
        </div>
        <div
          class="listeners-badge"
          id="live-indicator"
          data-testid="live-indicator"
          hidden
        >
          <span class="dot" aria-hidden="true"></span>
          <span id="listener-count">0</span>
          <span style="opacity: 0.6">слуш.</span>
        </div>
      </header>

      <section class="track-info" aria-live="polite">
        <div class="track-label">Сейчас в эфире</div>
        <div class="track-title" id="now-title" data-testid="now-title">Подключитесь к эфиру</div>
        <div class="track-artist" id="now-artist" data-testid="now-artist"></div>
        <span class="sr-only" id="content-type" data-testid="content-type">—</span>
      </section>

      <div class="controls">
        <button
          type="button"
          class="btn-play"
          id="play-btn"
          data-testid="play-btn"
          aria-label="Воспроизвести"
        >
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <polygon points="5,3 19,12 5,21" />
          </svg>
        </button>

        <button type="button" class="btn-stop" id="stop-btn" aria-label="Остановить эфир">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="5" y="5" width="14" height="14" rx="2" />
          </svg>
          Стоп
        </button>

        <div class="volume-wrap">
          <span class="volume-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M3 10v4a1 1 0 0 0 1 1h3l3.29 3.29c.63.63 1.71.18 1.71-.71V6.42c0-.89-1.08-1.34-1.71-.71L7 9H4a1 1 0 0 0-1 1z"
              />
              <path d="M16.5 12a4.5 4.5 0 0 0-1.5-3.35v6.7A4.5 4.5 0 0 0 16.5 12z" />
              <path d="M19.5 12a7.5 7.5 0 0 0-4.5-6.8v13.6A7.5 7.5 0 0 0 19.5 12z" />
            </svg>
          </span>
          <input
            type="range"
            class="volume-slider"
            id="volume"
            data-testid="volume"
            min="0"
            max="100"
            value="80"
            aria-label="Громкость"
          />
        </div>
      </div>

      <div class="progress-area">
        <span class="time-label" id="current-time">0:00</span>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <span class="time-label" id="total-time">0:00</span>
      </div>

      <p class="sr-only" id="play-prompt" data-testid="play-prompt" hidden>Нажмите Play</p>
      <p id="status" data-testid="status" role="status"></p>

      <select
        id="city-select"
        data-testid="city-select"
        aria-label="Выбор города"
      ></select>

      <audio id="stream" data-testid="stream" preload="none" playsinline></audio>
    </div>
    <script src="/player.js" defer></script>
  </body>
</html>
