# FM21 production gateway (U30/U33) — HTTP on localhost for local pet-project deploy.
# TLS termination is optional future work (ngrok or reverse proxy with SSL).

# Rate limit zones (http context — conf.d is included inside http {}).
limit_req_zone $binary_remote_addr zone=geo_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=bot_webhook:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/health {
        proxy_pass http://metadata:8080/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deep health is metadata-only — not proxied through this gateway.

    location /api/geo/ {
        limit_req zone=geo_api burst=20 nodelay;
        proxy_pass http://geo:8080/api/geo/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/now-playing/ {
        proxy_pass http://metadata:8080/api/now-playing/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/queue/ {
        proxy_pass http://metadata:8080/api/queue/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/bot/webhook {
        limit_req zone=bot_webhook burst=10 nodelay;
        proxy_pass http://bot:8080/api/bot/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/bot/ {
        proxy_pass http://bot:8080/api/bot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static upstream paths — do not use $request_uri in proxy_pass (requires resolver).
    location = /moscow {
        proxy_pass http://icecast:8000/moscow;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location = /spb {
        proxy_pass http://icecast:8000/spb;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    location = /ekb {
        proxy_pass http://icecast:8000/ekb;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # Player assets — same-origin; no CORS headers required (listener contract).
    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
